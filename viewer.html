<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Logistics Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f1f5f9; } /* 깔끔한 연회색 배경 */
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const simulationData = {{INJECT_JSON_DATA}};

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#f1f5f9');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 50000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.shadowMap.enabled = true;
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.maxPolarAngle = Math.PI / 2; // 땅바닥 아래로 카메라가 내려가지 않게 고정

        // 🌟 조명 설정 (밝고 선명하게)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(2000, 3000, 2000);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 파이썬에서 넘어온 트럭 제원 (이 값에 따라 모든 크기가 변합니다!)
        const truck = simulationData.truck;
        const viewW = truck.d; // 트럭 길이 (L)
        const viewH = truck.h; // 트럭 높이 (H)
        const viewD = truck.w; // 트럭 폭 (W)

        const cargoGroup = new THREE.Group();
        scene.add(cargoGroup);

        // ==============================================================
        // 🎯 1. 바닥 눈금자 (Grid)
        // ==============================================================
        const gridHelper = new THREE.GridHelper(20000, 100, 0x94a3b8, 0xcbd5e1);
        gridHelper.position.y = -50; 
        scene.add(gridHelper);

        // ==============================================================
        // 🎯 2. 진한 회색 트럭 철판 바닥
        // ==============================================================
        const bedThickness = 50;
        const bedGeo = new THREE.BoxGeometry(viewW, bedThickness, viewD);
        const bedMat = new THREE.MeshLambertMaterial({ color: 0x475569 }); // Slate Gray
        const truckBed = new THREE.Mesh(bedGeo, bedMat);
        truckBed.position.set(viewW/2, -bedThickness/2, viewD/2);
        truckBed.receiveShadow = true;
        cargoGroup.add(truckBed);

        // ==============================================================
        // 🎯 3. 파란색 적재 공간 테두리 (사용자가 원한 디자인)
        // ==============================================================
        const truckGeo = new THREE.BoxGeometry(viewW, viewH, viewD);
        truckGeo.translate(viewW/2, viewH/2, viewD/2); 
        // 🚨 테두리 색상을 파란색(0x3b82f6)으로 변경했습니다.
        const truckMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.3 });
        const truckMesh = new THREE.Mesh(truckGeo, truckMat);
        cargoGroup.add(truckMesh);


        // ==============================================================
        // 🎯 4. 화물(박스) 렌더링
        // ==============================================================
        simulationData.items.forEach(item => {
            const geo = new THREE.BoxGeometry(item.d, item.h, item.w);
            geo.translate(item.d/2, item.h/2, item.w/2);
            
            // 파이썬에서 지정한 색상(A형 빨강, B형 주황 등)을 그대로 사용
            const mat = new THREE.MeshLambertMaterial({ color: item.color });
            const mesh = new THREE.Mesh(geo, mat);
            
            // 파이썬에서 계산된 정확한 X, Y, Z 좌표에 배치
            mesh.position.set(item.z, item.y, item.x);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // 상자 테두리를 검은색 선으로 명확하게 표시
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.4, transparent: true }));
            mesh.add(line);

            cargoGroup.add(mesh);
        });

        // 🌟 3D 공간을 화면 중앙에 보기 좋게 정렬
        cargoGroup.position.x = -viewW / 2;
        cargoGroup.position.z = -viewD / 2;

        // 카메라 시작 앵글 (대각선 위에서 내려다보는 뷰)
        camera.position.set(viewW * 1.2, viewH * 1.5, viewD * 1.5);
        controls.target.set(0, viewH / 3, 0);
        controls.update();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
